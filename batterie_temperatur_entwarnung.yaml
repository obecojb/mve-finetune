blueprint:
  name: Batterie Temperatur-Entwarnung
  description: >
    Schaltet Laden und Entladen von Batteriespeichern wieder ein wenn die
    Innentemperatur nach einem Alarm für eine konfigurierbare Dauer unter
    einen Schwellwert gefallen ist. Sendet eine Push-Benachrichtigung.

    Setzt den `input_boolean` (Alarm-Status) zurück auf OFF.

    **Companion-Blueprint:** "Batterie Temperatur-Alarm" — beide Blueprints
    müssen mit demselben `input_boolean` konfiguriert werden.

    **Hinweis:** Nur ein Sensor muss die Entwarnung-Schwelle unterschreiten
    um die Rückschaltung auszulösen. Alle Schalter werden gemeinsam aktiviert.

  domain: automation
  author: obecojb
  homeassistant:
    min_version: "2023.4.0"

  input:
    section_sensoren:
      name: Temperatur-Sensoren
      icon: mdi:thermometer-chevron-down
      input:
        temp_sensors:
          name: Temperatur-Sensoren
          description: >
            Dieselben Sensoren wie im Companion-Blueprint "Batterie Temperatur-Alarm".
          selector:
            entity:
              multiple: true
              domain: sensor
              device_class: temperature

        temp_entwarnung:
          name: Entwarnung-Schwelle (°C)
          description: >
            Temperatur muss unter diesen Wert fallen um Entwarnung auszulösen.
            Empfehlung: 5°C unter der Alarm-Schwelle (Hysterese).
          default: 35
          selector:
            number:
              min: 15
              max: 75
              step: 1
              unit_of_measurement: °C
              mode: box

        temp_entwarnung_dauer:
          name: Dauer unter Entwarnung-Schwelle
          description: >
            Temperatur muss diese Dauer stabil unter der Schwelle bleiben.
            Empfehlung: 5 Minuten.
          default:
            hours: 0
            minutes: 5
            seconds: 0
          selector:
            duration:

    section_schalter:
      name: Batterie-Schalter
      icon: mdi:battery-charging
      input:
        discharge_switches:
          name: Entlade-Schalter (allow_discharge)
          description: Werden bei Entwarnung aktiviert (turn_on)
          selector:
            entity:
              multiple: true
              domain: switch

        charge_switches:
          name: Lade-Schalter (allow_charge)
          description: Werden bei Entwarnung aktiviert (turn_on)
          selector:
            entity:
              multiple: true
              domain: switch

    section_status:
      name: Alarm-Status
      icon: mdi:alert-circle-check
      input:
        alarm_boolean:
          name: Alarm-Status Boolean
          description: >
            Derselbe `input_boolean` wie im Companion-Blueprint "Batterie Temperatur-Alarm".
            Wird auf OFF gesetzt wenn Entwarnung aktiv ist.
          selector:
            entity:
              domain: input_boolean

    section_notify:
      name: Benachrichtigung
      icon: mdi:bell-check
      input:
        notify_target:
          name: Benachrichtigungs-Service
          description: >
            Entity des Notify-Services für Push-Benachrichtigung.
            Derselbe Service wie im Companion-Blueprint empfohlen.
          selector:
            entity:
              domain: notify

# ── TRIGGERS ──────────────────────────────────────────────────────────────────

triggers:
  - trigger: numeric_state
    entity_id: !input temp_sensors
    below: !input temp_entwarnung
    for: !input temp_entwarnung_dauer

# ── CONDITIONS ────────────────────────────────────────────────────────────────

conditions:
  - condition: state
    entity_id: !input alarm_boolean
    state: "on"

# ── ACTIONS ───────────────────────────────────────────────────────────────────

actions:
  # Entlade-Schalter reaktivieren
  - action: switch.turn_on
    target:
      entity_id: !input discharge_switches

  - delay:
      seconds: 2

  # Lade-Schalter reaktivieren
  - action: switch.turn_on
    target:
      entity_id: !input charge_switches

  # Alarm-Boolean zurücksetzen
  - action: input_boolean.turn_off
    target:
      entity_id: !input alarm_boolean

  # Push-Benachrichtigung
  - action: notify.send_message
    target:
      entity_id: !input notify_target
    data:
      title: "✅ Batterie Temperatur OK"
      message: >
        {{ trigger.to_state.attributes.friendly_name | default(trigger.to_state.entity_id) }}
        ist wieder bei {{ trigger.to_state.state | round(1) }} °C —
        Laden und Entladen wieder aktiviert.

mode: single
