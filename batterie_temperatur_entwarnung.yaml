blueprint:
  name: Battery Temperature All-Clear
  description: >
    Re-enables charging and discharging of battery storage when the internal
    temperature has dropped below a threshold for a configurable duration
    after an alarm. Sends a push notification.

    Resets the `input_boolean` (alarm status) back to OFF.

    **Companion blueprint:** "Battery Temperature Alarm" — both blueprints
    must be configured with the same `input_boolean`.

    **Note:** Only one sensor needs to drop below the all-clear threshold
    to trigger recovery. All switches are re-enabled together.

  domain: automation
  author: obecojb
  homeassistant:
    min_version: "2023.4.0"

  input:
    section_sensoren:
      name: Temperature Sensors
      icon: mdi:thermometer-chevron-down
      input:
        temp_sensors:
          name: Temperature Sensors
          description: >
            The same sensors as in the companion blueprint "Battery Temperature Alarm".
          selector:
            entity:
              multiple: true
              domain: sensor
              device_class: temperature

        temp_entwarnung:
          name: All-Clear Threshold (°C)
          description: >
            Temperature must drop below this value to trigger recovery.
            Recommendation: 5°C below the alarm threshold (hysteresis).
          default: 35
          selector:
            number:
              min: 15
              max: 75
              step: 1
              unit_of_measurement: °C
              mode: box

        temp_entwarnung_dauer:
          name: Duration Below All-Clear Threshold
          description: >
            Temperature must remain stably below the threshold for this duration.
            Recommendation: 5 minutes.
          default:
            hours: 0
            minutes: 5
            seconds: 0
          selector:
            duration:

    section_schalter:
      name: Battery Switches
      icon: mdi:battery-charging
      input:
        discharge_switches:
          name: Discharge Switches (allow_discharge)
          description: Turned on when all-clear is triggered
          selector:
            entity:
              multiple: true
              domain: switch

        charge_switches:
          name: Charge Switches (allow_charge)
          description: Turned on when all-clear is triggered
          selector:
            entity:
              multiple: true
              domain: switch

    section_status:
      name: Alarm Status
      icon: mdi:alert-circle-check
      input:
        alarm_boolean:
          name: Alarm Status Boolean
          description: >
            The same `input_boolean` as in the companion blueprint "Battery Temperature Alarm".
            Set to OFF when all-clear is triggered.
          selector:
            entity:
              domain: input_boolean

    section_notify:
      name: Notification
      icon: mdi:bell-check
      input:
        notify_target:
          name: Notification Service
          description: >
            Entity of the notify service for push notifications.
            Use the same service as in the companion blueprint.
          selector:
            entity:
              domain: notify

# ── TRIGGERS ──────────────────────────────────────────────────────────────────

triggers:
  - trigger: numeric_state
    entity_id: !input temp_sensors
    below: !input temp_entwarnung
    for: !input temp_entwarnung_dauer

# ── CONDITIONS ────────────────────────────────────────────────────────────────

conditions:
  - condition: state
    entity_id: !input alarm_boolean
    state: "on"

# ── ACTIONS ───────────────────────────────────────────────────────────────────

actions:
  # Re-enable discharge switches
  - action: switch.turn_on
    target:
      entity_id: !input discharge_switches

  - delay:
      seconds: 2

  # Re-enable charge switches
  - action: switch.turn_on
    target:
      entity_id: !input charge_switches

  # Reset alarm boolean
  - action: input_boolean.turn_off
    target:
      entity_id: !input alarm_boolean

  # Push notification
  - action: notify.send_message
    target:
      entity_id: !input notify_target
    data:
      title: "✅ Battery Temperature OK"
      message: >
        {{ trigger.to_state.attributes.friendly_name | default(trigger.to_state.entity_id) }}
        is back at {{ trigger.to_state.state | round(1) }} °C —
        charging and discharging have been re-enabled.

mode: single
