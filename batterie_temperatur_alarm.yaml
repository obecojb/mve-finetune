blueprint:
  name: Battery Temperature Alarm
  description: >
    Disables charging and discharging of battery storage when the internal
    temperature exceeds a threshold. Sends a push notification.

    Sets an `input_boolean` (alarm status) to ON — so other automations
    (e.g. "Battery Charge Lock") can detect that the temperature alarm is
    active and skip their own actions.

    Also checks on HA start whether temperatures are already elevated.

    **Companion blueprint:** "Battery Temperature All-Clear" for recovery.

  domain: automation
  author: obecojb
  homeassistant:
    min_version: "2023.4.0"

  input:
    section_sensoren:
      name: Temperature Sensors
      icon: mdi:thermometer-alert
      input:
        temp_sensors:
          name: Temperature Sensors
          description: >
            Internal temperature sensors of the batteries.
            Each sensor triggers independently.
          selector:
            entity:
              multiple: true
              domain: sensor
              device_class: temperature

        temp_schwelle:
          name: Alarm Threshold (°C)
          description: Exceeding this temperature triggers the alarm.
          default: 40
          selector:
            number:
              min: 20
              max: 80
              step: 1
              unit_of_measurement: °C
              mode: box

        temp_verzoegerung:
          name: Delay Before Alarm
          description: >
            Temperature must stay above the threshold for this duration before
            the alarm triggers. Prevents false alarms from brief spikes.
          default:
            hours: 0
            minutes: 0
            seconds: 30
          selector:
            duration:

    section_schalter:
      name: Battery Switches
      icon: mdi:battery-off
      input:
        discharge_switches:
          name: Discharge Switches (allow_discharge)
          description: Turned off when alarm is active
          selector:
            entity:
              multiple: true
              domain: switch

        charge_switches:
          name: Charge Switches (allow_charge)
          description: Turned off when alarm is active
          selector:
            entity:
              multiple: true
              domain: switch

    section_status:
      name: Alarm Status
      icon: mdi:alert
      input:
        alarm_boolean:
          name: Alarm Status Boolean
          description: >
            Set to ON when alarm is active. Other automations
            (e.g. Charge Lock) can check this boolean and skip
            their actions while the alarm is active.
          selector:
            entity:
              domain: input_boolean

    section_notify:
      name: Notification
      icon: mdi:bell-alert
      input:
        notify_target:
          name: Notification Service
          description: >
            Entity of the notify service for push notifications.
            Example: notify.mobile_app_my_phone
          selector:
            entity:
              domain: notify

# ── TRIGGERS ──────────────────────────────────────────────────────────────────

triggers:
  - trigger: numeric_state
    entity_id: !input temp_sensors
    above: !input temp_schwelle
    for: !input temp_verzoegerung
    id: temperatur

  - trigger: homeassistant
    event: start
    id: startup

# ── CONDITIONS ────────────────────────────────────────────────────────────────

conditions: []

# ── ACTIONS ───────────────────────────────────────────────────────────────────

actions:
  - variables:
      _temp_sensors: !input temp_sensors
      _temp_schwelle: !input temp_schwelle
      _alarm_boolean: !input alarm_boolean
      _discharge_switches: !input discharge_switches
      _charge_switches: !input charge_switches
      alarm_war_aktiv: "{{ is_state(_alarm_boolean, 'on') }}"

  # On HA start: wait briefly until entities are available
  - if:
      - condition: template
        value_template: "{{ trigger.id == 'startup' }}"
    then:
      - delay:
          seconds: 30

  # Set alarm boolean
  - action: input_boolean.turn_on
    target:
      entity_id: !input alarm_boolean

  # Check each sensor — turn off overheated batteries
  - repeat:
      for_each: "{{ _temp_sensors }}"
      sequence:
        - if:
            - condition: numeric_state
              entity_id: "{{ repeat.item }}"
              above: !input temp_schwelle
          then:
            - action: switch.turn_off
              target:
                entity_id: !input discharge_switches
            - delay:
                seconds: 2
            - action: switch.turn_off
              target:
                entity_id: !input charge_switches

  # Push notification for new alarm (not on startup, not if already active)
  - if:
      - condition: template
        value_template: "{{ trigger.id == 'temperatur' and not alarm_war_aktiv }}"
    then:
      - action: notify.send_message
        target:
          entity_id: !input notify_target
        data:
          title: "⚠️ Battery Overheating"
          message: >
            {{ trigger.to_state.attributes.friendly_name | default(trigger.to_state.entity_id) }}
            reports {{ trigger.to_state.state | round(1) }} °C —
            threshold of {{ _temp_schwelle }}°C exceeded!
            Charging and discharging have been disabled.

  # On startup: notification if already overheated
  - if:
      - condition: template
        value_template: "{{ trigger.id == 'startup' }}"
    then:
      - variables:
          startup_hot: >
            {% set ns = namespace(list=[]) %}
            {% for s in _temp_sensors %}
              {% if states(s) | float(0) > _temp_schwelle %}
                {% set ns.list = ns.list + [
                  state_attr(s, 'friendly_name') | default(s, true) +
                  ' (' + states(s) + '°C)'
                ] %}
              {% endif %}
            {% endfor %}
            {{ ns.list | join(', ') }}
      - if:
          - condition: template
            value_template: "{{ startup_hot != '' }}"
        then:
          - action: notify.send_message
            target:
              entity_id: !input notify_target
            data:
              title: "⚠️ Battery Overheating Detected on Startup"
              message: >
                The following sensors are above {{ _temp_schwelle }}°C: {{ startup_hot }}.
                Charging and discharging have been disabled.

mode: parallel
