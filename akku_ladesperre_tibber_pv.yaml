blueprint:
  name: Battery Charge Lock (Electricity Price + PV Surplus)
  description: >
    Automatically controls charge and discharge permission of battery storage
    based on current electricity price and PV surplus.

    **Priority:**
    1. Temperature alarm active → no action
    2. PV surplus (grid draw below feed-in threshold) → discharge OFF, charge ON
    3. Price below threshold → discharge OFF, charge ON
    4. Price above threshold → discharge ON, charge OFF

    Sends a `persistent_notification` only when something actually changes.

    Also triggers on HA start and every hour at XX:05 to ensure correct state
    after a restart or reload — no threshold crossing required.

    **Requirements:**
    - Electricity price sensor in ct/kWh
    - Grid power sensor: negative value = feed-in, positive value = grid draw
    - Temperature alarm: an `input_boolean` set by a separate automation
      (e.g. Blueprint "Battery Temperature Alarm"). If not needed: create an
      always-OFF boolean.

  domain: automation
  author: obecojb
  homeassistant:
    min_version: "2023.4.0"

  input:
    section_preis:
      name: Electricity Price
      icon: mdi:currency-eur
      input:
        preis_sensor:
          name: Electricity Price Sensor
          description: Current electricity price in ct/kWh
          selector:
            entity:
              domain: sensor

        preis_schwelle:
          name: Price Threshold (ct/kWh)
          description: >
            Below → charge allowed, discharge locked.
            Above → discharge allowed, charge locked.
          default: 25
          selector:
            number:
              min: 1
              max: 150
              step: 1
              unit_of_measurement: ct/kWh
              mode: box

    section_pv:
      name: PV Surplus / Grid Draw
      icon: mdi:solar-power
      input:
        leistung_sensor:
          name: Grid Power Sensor
          description: >
            Sensor for grid power in watts.
            Negative value = feed-in to grid (PV surplus).
            Positive value = draw from grid.
          selector:
            entity:
              domain: sensor

        schwelle_einspeisung:
          name: Feed-in Threshold (Watts)
          description: >
            PV surplus is detected when grid draw is BELOW this negative value.
            Recommendation: -100 W (filters measurement noise).
          default: -100
          selector:
            number:
              min: -5000
              max: -10
              step: 10
              unit_of_measurement: W
              mode: box

        schwelle_bezug:
          name: Grid Draw Threshold (Watts)
          description: >
            PV surplus ends when grid draw is ABOVE this positive value.
            Recommendation: 100 W (symmetric to feed-in threshold).
          default: 100
          selector:
            number:
              min: 10
              max: 5000
              step: 10
              unit_of_measurement: W
              mode: box

        leistung_verzoegerung:
          name: Grid Power Trigger Delay
          description: >
            Stable duration before grid power trigger fires.
            Recommendation: 2 minutes (filters ~74% of false triggers from noise).
          default:
            hours: 0
            minutes: 2
            seconds: 0
          selector:
            duration:

    section_schalter:
      name: Battery Switches
      icon: mdi:battery-charging
      input:
        discharge_switches:
          name: Discharge Switches (allow_discharge)
          description: Switches that allow or lock battery discharge
          selector:
            entity:
              multiple: true
              domain: switch

        charge_switches:
          name: Charge Switches (allow_charge)
          description: Switches that allow or lock battery charging
          selector:
            entity:
              multiple: true
              domain: switch

    section_schutz:
      name: Protection
      icon: mdi:shield-alert
      input:
        temperatur_alarm:
          name: Temperature Alarm Boolean
          description: >
            When this input boolean is 'on', the automation aborts immediately.
            This gives a separate temperature alarm automation full control.
            Tip: use the "Battery Temperature Alarm" blueprint.
          selector:
            entity:
              domain: input_boolean

# ── TRIGGERS ──────────────────────────────────────────────────────────────────

triggers:
  - trigger: homeassistant
    event: start
    id: ha_start

  - trigger: time_pattern
    minutes: "5"
    id: stundlich

  - trigger: numeric_state
    entity_id: !input preis_sensor
    below: !input preis_schwelle
    id: preis_guenstig

  - trigger: numeric_state
    entity_id: !input preis_sensor
    above: !input preis_schwelle
    id: preis_teuer

  - trigger: numeric_state
    entity_id: !input leistung_sensor
    below: !input schwelle_einspeisung
    for: !input leistung_verzoegerung
    id: pv_ueberschuss

  - trigger: numeric_state
    entity_id: !input leistung_sensor
    above: !input schwelle_bezug
    for: !input leistung_verzoegerung
    id: netzbezug

# ── CONDITIONS ────────────────────────────────────────────────────────────────

conditions:
  - condition: state
    entity_id: !input temperatur_alarm
    state: "off"

# ── ACTIONS ───────────────────────────────────────────────────────────────────

actions:
  # Step 1: Make blueprint inputs available as template variables
  - variables:
      _preis_sensor: !input preis_sensor
      _leistung_sensor: !input leistung_sensor
      _preis_schwelle: !input preis_schwelle
      _schwelle_einspeisung: !input schwelle_einspeisung
      _discharge_switches: !input discharge_switches
      _charge_switches: !input charge_switches

  # Step 2: Calculate target state, collect only switches that need changing
  - variables:
      switches_to_change: >
        {% set preis = states(_preis_sensor) | float(-1) %}
        {% set netzbezug = states(_leistung_sensor) | float(0) %}
        {% set pv_ueberschuss = netzbezug < _schwelle_einspeisung %}
        {% if preis < 0 and not pv_ueberschuss %}
          {{ [] }}
        {% else %}
          {% if pv_ueberschuss %}
            {% set t_dis = 'off' %}
            {% set t_ch = 'on' %}
          {% elif preis < _preis_schwelle %}
            {% set t_dis = 'off' %}
            {% set t_ch = 'on' %}
          {% else %}
            {% set t_dis = 'on' %}
            {% set t_ch = 'off' %}
          {% endif %}
          {% set ns = namespace(list=[]) %}
          {% for s in _discharge_switches %}
            {% if states(s) != t_dis %}
              {% set ns.list = ns.list + [{
                'entity': s,
                'name': state_attr(s, 'friendly_name') | default(s, true),
                'old': states(s),
                'target': t_dis
              }] %}
            {% endif %}
          {% endfor %}
          {% for s in _charge_switches %}
            {% if states(s) != t_ch %}
              {% set ns.list = ns.list + [{
                'entity': s,
                'name': state_attr(s, 'friendly_name') | default(s, true),
                'old': states(s),
                'target': t_ch
              }] %}
            {% endif %}
          {% endfor %}
          {{ ns.list }}
        {% endif %}

  # Step 3: Abort if no changes needed
  - condition: template
    value_template: "{{ switches_to_change | length > 0 }}"

  # Step 4: Set switches
  - repeat:
      for_each: "{{ switches_to_change }}"
      sequence:
        - choose:
            - conditions: "{{ repeat.item.target == 'on' }}"
              sequence:
                - action: switch.turn_on
                  target:
                    entity_id: "{{ repeat.item.entity }}"
            - conditions: "{{ repeat.item.target == 'off' }}"
              sequence:
                - action: switch.turn_off
                  target:
                    entity_id: "{{ repeat.item.entity }}"

  # Step 5: Summary notification
  - action: persistent_notification.create
    data:
      title: "Battery Lock: Price / PV Surplus"
      message: >
        {% set netzbezug = states(_leistung_sensor) | float(0) %}
        {% set preis = states(_preis_sensor) | float(0) %}
        {% set pv_ueberschuss = netzbezug < _schwelle_einspeisung %}
        {% if pv_ueberschuss %}
        Mode: **PV surplus** (grid {{ netzbezug | round(0) }} W → discharge OFF, charge ON)
        {% elif preis < _preis_schwelle %}
        Mode: **cheap** ({{ preis }} ct/kWh < {{ _preis_schwelle }} ct → discharge OFF, charge ON)
        {% else %}
        Mode: **expensive** ({{ preis }} ct/kWh ≥ {{ _preis_schwelle }} ct → discharge ON, charge OFF)
        {% endif %}

        Changed switches:
        {% for item in switches_to_change %}
        - {{ item.name }}: `{{ item.old }}` → `{{ item.target }}`
        {% endfor %}

mode: single
